include "base-test.conf"

app {
  openid {
    client-id = foo
    client-secret = bar
    authorize-url = "http://localhost:9001/connect/authorize"
    token-url = "http://localhost:9001/connect/token"
    redirect-url = "http://localhost:3000/login"
    scopes = "openid email profile roles"
    username-field = name
    email-field = email
    role-right-mode = initial
    role-claim = roles
    max-right-by-roles = {
        "": {
            admin: false
        }
        admin: {
            admin: false
            tenants: {
                test: {
                    level: write
                    max-project-right: write
                    max-key-right: read
                    max-webhook-right: none
                }
            }
        }
    }
    right-by-roles = {
        "": {
            admin: true
            tenants: {
                test: {
                    level: read
                }
            }
        }
        admin: {
            tenants: {
                test: {
                    level: read
                    default-project-right: write
                    default-key-right: read
                    default-webhook-right: write
                    projects: {
                        proj: admin
                    }
                }
            }
        }
    }
  }
}