[tools]
java = "temurin-21"
sbt = "1.12"
node = "24"
"github:F1bonacc1/process-compose" = "1"

[tasks."install:front"]
dir = "izanami-frontend"
run = "npm install --force && npx playwright install chromium"

[tasks."install:back"]
run = "docker-compose pull && sbt compile"

[tasks.install]
run = [{task = "install:front"}, {task = "install:back"}]

[tasks."dev:containers"]
run = "docker-compose rm -f && docker-compose --ansi=always up"

[tasks.clean]
run = "docker-compose down && docker-compose rm -f"

[tasks."dev:front"]
dir = "izanami-frontend"
run = "FORCE_COLOR=1 npm run dev"

[tasks."dev:back"]
run = "sbt --color=true -jvm-debug 5005 \"~run -Dconfig.resource=dev.conf\""
raw=true

[tasks.dev]
run = "process-compose -f ./process-compose.yaml"

[tasks.doc]
dir = "manual"
run = "npm start"

[tasks."test:back"]
run = "sbt \"testOnly *AllTests\""

[tasks."test:front"]
dir = "izanami-frontend"
run = "npm test"

[tasks.tests]
run = [{task = "test:front"}, {task = "test:back"}]


[tasks."package:front"]
dir = "izanami-frontend"
run = "npm run build"

[tasks."package:back"]
run = "sbt \"set test in assembly := {}\" clean assembly"

[tasks.package]
run = [{task = "package:front"}, {task = "package:back"}]

[tasks."package:run"]
run = "java -Dconfig.resource=dev.conf -jar ./target/izanami.jar"

[tasks."docker:build"]
run = "docker build -t izanami ."

[tasks."docker:run"]
run = "docker run --env IZANAMI_PG_URI=postgresql://postgres:postgres@host.docker.internal:5432/postgres -p 9000:9000 izanami"

[tasks."docker:build-demo"]
run = "docker build -t izanami-test-standalone -f ./demo-docker-image/Dockerfile-pg-embeded ."

